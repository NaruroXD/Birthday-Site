<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>
<style>

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  text-align:center;
  overflow:hidden;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);
  background-size:400% 400%;
  animation: gradientBG 12s ease infinite;
  color:white;
}

@keyframes gradientBG{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.page{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  backdrop-filter: blur(10px);
}

#page1{display:flex;}

button{
  padding:12px 25px;
  margin:10px;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  background:rgba(255,255,255,0.3);
  color:white;
  backdrop-filter: blur(5px);
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  background:rgba(255,255,255,0.5);
}

/* Floating aesthetic circles */
.circle{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  animation: float 15s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* Popup */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:white;
  color:#ff4da6;
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,0,0,0.3);
  transition:0.4s;
}

.popup.show{
  transform:translate(-50%,-50%) scale(1);
}

</style>
</head>
<body>

<!-- Floating aesthetic elements -->
<script>
for(let i=0;i<20;i++){
  let c=document.createElement("div");
  c.className="circle";
  c.style.width=(20+Math.random()*80)+"px";
  c.style.height=c.style.width;
  c.style.left=Math.random()*100+"vw";
  c.style.animationDuration=(10+Math.random()*10)+"s";
  document.body.appendChild(c);
}
</script>

<!-- Pages -->
<div id="page1" class="page">
  <h1>Want to see something cool? 😽</h1>
  <button onclick="showPage('page2')">Yes</button>
  <button onclick="showPage('noPage')">No</button>
</div>

<div id="noPage" class="page">
  <h1>How dare you! 😡</h1>
  <button onclick="showPage('page1')">Back</button>
</div>

<div id="page2" class="page">
  <h1>Click on Next for something crazy 🎊</h1>
  <button onclick="showPage('page3')">Next</button>
</div>

<div id="page3" class="page">
  <h1>Almost there 😄😚</h1>
  <button onclick="showPage('page4')">Next</button>
</div>

<div id="page4" class="page">
  <h1>HAPPY BIRTHDAY 🎉🎂</h1>
  <p>You are my world dear 💖</p>
</div>

<!-- Popup -->
<div id="popup" class="popup">
  <h2>🎊 Surpriseeee! 🎊</h2>
  <p>You mean everything to me 💕</p>
  <button onclick="closePopup()">Close</button>
</div>

<script>
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="flex";

  if(id==="page4"){
    setTimeout(()=>{
      document.getElementById("popup").classList.add("show");
    },1000);
  }
}

function closePopup(){
  document.getElementById("popup").classList.remove("show");
}
</script>

</body>
</html>
